<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hacker Zone</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #f8fafc;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        background: rgba(15, 23, 42, 0.9);
        padding: 2rem 2.5rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        text-align: center;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      p {
        margin: 0;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hacker Zone</h1>
      <p>Local server is running successfully.</p>
    </main>
  </body>
</html>
